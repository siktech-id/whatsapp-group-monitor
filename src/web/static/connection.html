<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PROJECT_NAME}}</title>
  <meta name="csrf-token" content="{{CSRF_TOKEN}}" />
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    .content { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .qr-box {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      text-align: center;
      display: inline-block;
      min-width: 300px;
    }
    .qr-wrap { text-align: center; }
    #status { color: #667781; margin: 0 0 1rem; }
    .waiting { color: #667781; }
    .reconnecting { color: #e67e22; }
    .error { color: #e74c3c; }
  </style>
</head>
<body>
  {{> header}}
  <div class="content">
    {{> status-bar}}
    <div class="qr-wrap"><div class="qr-box">
      <p id="status" class="waiting">Loading...</p>
      <div id="qr-img"></div>
    </div></div>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const qrEl = document.getElementById('qr-img');

    async function poll() {
      try {
        const res = await fetch('/api/status');
        if (res.status === 401) { window.location.href = '/login'; return; }
        const data = await res.json();

        qrEl.innerHTML = '';

        if (data.state === 'open') {
          window.location.href = '/';
          return;
        } else if (data.qr) {
          statusEl.textContent = 'Scan this QR code with WhatsApp';
          statusEl.className = 'waiting';
          qrEl.innerHTML = '<img src="' + data.qr + '" alt="QR Code" />';
        } else if (data.state === 'close') {
          statusEl.textContent = 'Reconnecting...';
          statusEl.className = 'reconnecting';
        } else {
          statusEl.textContent = 'Connecting...';
          statusEl.className = 'waiting';
        }
      } catch (e) {
        statusEl.textContent = 'Error connecting to server';
        statusEl.className = 'error';
      }
    }

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
