<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PROJECT_NAME}}</title>
  <meta name="csrf-token" content="{{CSRF_TOKEN}}" />
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    .content { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    th, td { padding: 0.75rem 1rem; text-align: left; }
    th { background: #f8f9fa; color: #667781; font-weight: 600; font-size: 0.85rem; }
    td { border-top: 1px solid #eee; color: #1a1a1a; font-size: 0.9rem; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    th.num { text-align: right; }
    .badge {
      display: inline-block;
      padding: 0 0.4rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      vertical-align: baseline;
    }
    .badge-community { background: #e8f5e9; color: #2e7d32; }
    .badge-participant { background: #e3f2fd; color: #1565c0; }
    .badge-admin { background: #fff3e0; color: #e65100; }
    .badge-superadmin { background: #f3e5f5; color: #7b1fa2; }
    .indent { padding-left: 2.5rem; }
    .muted { color: #999; }
    a.group-link { color: #1a1a1a; text-decoration: none; }
    a.group-link:hover { text-decoration: underline; }
    .loading { text-align: center; padding: 2rem; color: #667781; }
  </style>
</head>
<body>
  {{> header}}
  <div class="content">
    {{> status-bar}}
    <h2 style="font-size: 1.1rem; color: #1a1a1a;">Groups</h2>
    <div id="groups"><p class="loading">Loading...</p></div>
  </div>
  <script>
    async function loadGroups() {
      try {
        const res = await fetch('/api/groups');
        if (res.status === 401) { window.location.href = '/login'; return; }
        const data = await res.json();
        const groups = data.groups || [];
        if (groups.length === 0) {
          document.getElementById('groups').innerHTML = '<p class="loading">No groups found</p>';
          return;
        }

        const sortName = (a, b) => a.name.localeCompare(b.name);
        const childMap = {};
        for (const g of groups) {
          if (g.parentCommunityJid) {
            if (!childMap[g.parentCommunityJid]) childMap[g.parentCommunityJid] = [];
            childMap[g.parentCommunityJid].push(g);
          }
        }
        for (const jid in childMap) childMap[jid].sort(sortName);
        const topLevel = groups.filter(g => !g.parentCommunityJid).sort(sortName);

        let html = '<table><thead><tr><th>Name</th><th class="num">Members</th><th class="num">Activity (30d)</th><th>Last activity</th><th>Your role</th></tr></thead><tbody>';

        function addRow(g, indent) {
          const nameText = escHtml(g.name);
          const link = '<a class="group-link" href="/group/' + encodeURIComponent(g.jid) + '">' + nameText + '</a>';
          const name = (indent ? '<span class="indent">' : '') + link
            + (g.isCommunity ? ' <span class="badge badge-community">community</span>' : '')
            + (indent ? '</span>' : '');
          const role = g.botMembership === 'none' ? '<span class="muted">-</span>' : '<span class="badge badge-' + g.botMembership + '">' + g.botMembership + '</span>';
          const activity = g.activityCount || 0;
          const lastAct = g.lastActivity ? timeAgo(g.lastActivity) : '<span class="muted">-</span>';
          html += '<tr><td>' + name + '</td><td class="num">' + (g.memberCount || 0) + '</td><td class="num">' + activity + '</td><td>' + lastAct + '</td><td>' + role + '</td></tr>';
        }

        for (const g of topLevel) {
          addRow(g, false);
          if (g.isCommunity) {
            for (const child of (childMap[g.jid] || [])) {
              addRow(child, true);
            }
          }
        }

        html += '</tbody></table>';
        document.getElementById('groups').innerHTML = html;
      } catch (e) {
        document.getElementById('groups').innerHTML = '<p class="loading">Failed to load groups</p>';
      }
    }

    function timeAgo(ts) {
      const seconds = Math.floor(Date.now() / 1000) - ts;
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + 'm ago';
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      if (days < 30) return days + 'd ago';
      return Math.floor(days / 30) + 'mo ago';
    }
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    loadGroups();
  </script>
</body>
</html>
