<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings &middot; {{PROJECT_NAME}}</title>
  <meta name="csrf-token" content="{{CSRF_TOKEN}}" />
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    .content { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .back { color: #667781; text-decoration: none; font-size: 0.85rem; }
    .back:hover { text-decoration: underline; }
    .settings-box {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 1rem auto;
    }
    h2 { color: #1a1a1a; font-size: 1.1rem; margin: 0 0 1.5rem; }
    label { display: block; color: #667781; font-size: 0.85rem; margin-bottom: 0.25rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 1rem;
    }
    input:focus { border-color: #25d366; }
    .save-btn {
      padding: 0.6rem 1.5rem;
      background: #25d366;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .save-btn:hover { background: #1da851; }
    .msg { font-size: 0.85rem; margin-top: 0.75rem; }
    .msg-ok { color: #25d366; }
    .msg-err { color: #e74c3c; }
  </style>
</head>
<body>
  {{> header}}
  <div class="content">
    {{> status-bar}}
    <a class="back" href="/" id="back-link">&larr; Back to groups</a>
    <div class="settings-box">
      <h2>Settings</h2>
      <form id="form" onsubmit="save(event)">
        <label for="project_name">Project name</label>
        <input type="text" id="project_name" name="project_name" />

        <label for="page_size">Items per page</label>
        <input type="number" id="page_size" name="page_size" min="10" max="500" />

        <button type="submit" class="save-btn">Save</button>
        <p class="msg" id="msg"></p>
      </form>
    </div>
  </div>
  <script>
    const csrf = document.querySelector('meta[name="csrf-token"]').content;

    async function load() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        document.getElementById('project_name').value = data.project_name || '';
        document.getElementById('page_size').value = data.page_size || '50';
      } catch (e) {
        showMsg('Failed to load settings', false);
      }
    }

    async function save(e) {
      e.preventDefault();
      try {
        const res = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-csrf-token': csrf },
          body: JSON.stringify({
            project_name: document.getElementById('project_name').value,
            page_size: document.getElementById('page_size').value,
          }),
        });
        if (res.ok) showMsg('Settings saved', true);
        else showMsg('Failed to save', false);
      } catch (e) {
        showMsg('Failed to save', false);
      }
    }

    function showMsg(text, ok) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
      setTimeout(() => { el.textContent = ''; }, 3000);
    }

    document.addEventListener('statusbar:state', (e) => {
      if (e.detail !== 'open') document.getElementById('back-link').textContent = '\u2190 Back';
    });

    load();
  </script>
</body>
</html>
